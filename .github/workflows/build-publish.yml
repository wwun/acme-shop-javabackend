name: Build and Publish Docker Images

on:
  push:
    branches: 
      - "main"

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - config-server
          - eureka-server
          - product-service
          - inventory-service
          - order-service
          - auth-service
          - user-service
          - cart-service
          - api-gateway-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Install Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          
      - name: Build project
        run: mvn clean package -DskipTests
        
      - name: Log into GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Build docker images
        run: |
          docker build -t ghcr.io/${{ github.repository }}/{{ matrix.service }}:${{ github.sha }} -t ghcr.io/${{ github.repository }}/{{ matrix.service }}:latest ./{{ matrix.service }}
          
        
      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository }}/{{ matrix.service }}:${{ github.sha}}
          docker push ghcr.io/${{ github.repository }}/{{ matrix.service }}:latest
